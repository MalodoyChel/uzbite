name: Deploy to GitHub Pages

on:
  push:
    branches: ['main'] # Триггер: когда вы пушите в main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci  # Установка зависимостей
      
      - name: Build
        run: npm run build  # Сборка проекта
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'  # Папка, куда Vite собирает проект
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4